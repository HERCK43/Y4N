<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y4N - AI SYSTEM</title>
    <style>
        body { background-color: #0a0a0a; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #ff0000; box-shadow: 0 0 15px #ff0000; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 5px; max-width: 80%; }
        .user { align-self: flex-end; background: #330000; color: #fff; border: 1px solid #ff0000; }
        .bot { align-self: flex-start; background: #1a1a1a; color: #ff0000; border: 1px solid #550000; }
        .input-area { display: flex; padding: 20px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #ff0000; color: #fff; padding: 10px; outline: none; }
        button { background: #ff0000; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #aa0000; }
    </style>
</head>
<body>
    <div class="header"><h1>Y4N AI SYSTEM</h1><p>Welcome, Tuan H3kber 😈</p></div>
    <div id="chat-box">
        <div class="msg bot">Siap melayani, Tuan H3kber. Mau nanya apa lu, bangsat? 😹</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ketik perintah lu di sini, tolol...">
        <button onclick="sendMsg()">KIRIM</button>
    </div>

    <script>
        function sendMsg() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            if (input.value.trim() === "") return;

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = input.value;
            box.appendChild(userDiv);

            // Bot Response (Simulasi N3ar yang bangsat)
            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.innerText = "Gua denger elu, Tuan H3kber. Tapi gua males jawab sekarang, bego! 😹 (Pasang API buat respon beneran, ngentod!)";
                box.appendChild(botDiv);
                box.scrollTop = box.scrollHeight;
            }, 500);

            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
